<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Fates-Strategist</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="drag-region">
        <h2>Fates Strategist</h2>
        <div class="header-buttons">
            <button id="settings-toggle" class="icon-btn">⚙️</button>
            <button id="close-app" class="icon-btn close-btn">❌</button>
        </div>
    </div>

    <div id="settings-panel" class="hidden">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="Enter your key">

        <label for="wallet-address" style="margin-top: 5px;">Wallet Address:</label>
        <input type="text" id="wallet-address" placeholder="0x...">

        <button id="save-key">Sauvegarder</button>
        <button id="sync-deck" style="background-color: #a855f7; margin-top: 5px;">Synchroniser mon Deck</button>
        <span id="save-status"></span>
    </div>

    <div id="feed" class="content">
        <div class="message default-msg">En attente d'événements du jeu...</div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
