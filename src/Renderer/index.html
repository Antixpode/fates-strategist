<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Fates Strategist Overlay</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="overlay-body">

    <div id="app-container">
        <!-- TOP: Title & Controls -->
        <div class="header-overlay">
            <div class="title-section">
                <h1>Fates Strategist</h1>
                <div class="status-indicator">
                    <span id="strat-dot" class="strategic-dot dot-grey"></span>
                    <span id="strat-advice">En veille...</span>
                </div>
            </div>
            <div class="controls">
                <div id="sync-status" class="sync-indicator sync-syncing" title="Synchronisation...">🔄</div>
                <div id="settings-toggle" class="icon-btn">⚙️</div>
                <div id="close-app" class="icon-btn close-btn">✖</div>
            </div>
        </div>

        <!-- MAIN FEED -->
        <div id="feed" class="log-feed">
            <div class="message default-msg">En attente d'événements du jeu...</div>
        </div>

        <!-- TARGETING ADVICE (Integrated into old layout) -->
        <div id="targeting-advice-container" class="targeting-container hidden">
            <div id="targeting-advice" class="targeting-action"></div>
        </div>

        <!-- OPPONENT LIVE ACTION -->
        <div id="opponent-action" class="opponent-action-bar hidden">
            <span id="opponent-action-text">...</span>
        </div>
        <div class="hud-stats">
            <!-- HP Status bar -->
            <div id="hp-status" class="hp-status hp-stable">
                <span id="hp-icon">🟢</span>
                <span id="hp-text">ÉTAT : STABLE</span>
                <span id="hp-value">30 PV</span>
            </div>

            <!-- Probabilistic Alert -->
            <div id="threat-alert" class="threat-card hidden">
                <div class="threat-header">⚠️ RISQUE DE SORT DE ZONE</div>
                <div class="threat-body">
                    <span id="aoe-prob" class="threat-value">0</span>%
                </div>
                <div id="opp-stats" class="opp-stats"></div>
            </div>

            <!-- AoE Risk Alert (Turn/Gold) -->
            <div id="aoe-risk-alert" class="aoe-flash-alert hidden">
                ⚠️ RISQUE DE SORT DE ZONE : ÉLEVÉ
            </div>

            <!-- Priority Target Badge -->
            <div id="priority-badge" class="priority-badge hidden">
                🎯 CIBLE PRIORITAIRE : <span id="priority-name">...</span>
            </div>
        </div>

        <!-- AI ADVICE PANEL (BOTTOM) -->
        <div id="groq-advice-panel">
            <div class="groq-header">CONSEIL IA (GROQ)</div>
            <div id="groq-advice-text">En attente d'analyse...</div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="settings-window hidden">
            <div class="settings-header">
                <h3>Configuration</h3>
                <div id="close-settings" class="icon-btn close-btn">✖</div>
            </div>
            <div class="setting-item">
                <label>Clé API Groq:</label>
                <input type="password" id="groq-key" placeholder="Entrez votre clé Groq">
            </div>
            <div class="setting-item">
                <label>Adresse Wallet (Immutable):</label>
                <input type="text" id="wallet-address" placeholder="0x...">
            </div>
            <div class="setting-item">
                <label>Langue de l'IA:</label>
                <div class="lang-toggle">
                    <button id="lang-fr" class="lang-btn">FR</button>
                    <button id="lang-en" class="lang-btn">EN</button>
                </div>
            </div>
            <div class="settings-actions">
                <button id="sync-deck">Sync Deck</button>
                <button id="save-key">Sauvegarder</button>
            </div>
            <span id="save-status"></span>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
