<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Fates-Strategist</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header / Drag region -->
    <div class="drag-region">
        <h2>Fates Strategist</h2>
        <div class="header-buttons">
            <button id="settings-toggle" class="icon-btn">⚙️</button>
            <button id="close-app" class="icon-btn close-btn">❌</button>
        </div>
    </div>

    <!-- Strategic Indicator bar (color dot + advice) -->
    <div class="strategic-container">
        <div id="strat-dot" class="strategic-dot dot-orange"></div>
        <div id="strat-advice" class="strategic-advice">Analyse stratégique...</div>
    </div>

    <!-- HP Status bar -->
    <div id="hp-status" class="hp-status hp-stable">
        <span id="hp-icon">🟢</span>
        <span id="hp-text">ÉTAT : STABLE</span>
        <span id="hp-value" class="hp-value">❤️ 30 PV</span>
    </div>

    <!-- AoE Threat alert -->
    <div id="threat-alert" class="hidden threat-alert">
        <span>🔥 MENACE AOE: <span id="aoe-prob">0</span>%</span>
        <span id="opp-stats" class="opp-stats-text">Main: 0 | Or: 0</span>
    </div>

    <!-- AoE Turn/Gold rule alert -->
    <div id="aoe-risk-alert" class="hidden aoe-risk-alert">
        ⚠️ RISQUE DE SORT DE ZONE : ÉLEVÉ
    </div>

    <!-- Priority Target badge -->
    <div id="priority-badge" class="hidden priority-badge">
        🎯 CIBLE PRIORITAIRE : <span id="priority-name">Vampire</span>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden">
        <label for="groq-key">🤖 Groq API Key (gsk_...):</label>
        <input type="password" id="groq-key" placeholder="gsk_xxxxxxxxxxxx">

        <label for="wallet-address" style="margin-top: 5px;">💎 Wallet Address:</label>
        <input type="text" id="wallet-address" placeholder="0x...">

        <label style="margin-top: 5px;">🌐 Langue des conseils IA:</label>
        <div class="lang-toggle">
            <button id="lang-fr" class="lang-btn active-lang">🇫🇷 FR</button>
            <button id="lang-en" class="lang-btn">🇬🇧 EN</button>
        </div>

        <button id="save-key">Sauvegarder</button>
        <button id="sync-deck" style="background-color: #a855f7; margin-top: 5px;">Synchroniser mon Deck</button>
        <span id="save-status"></span>
    </div>

    <!-- Event feed (scrollable) -->
    <div id="feed" class="content">
        <div class="message default-msg">En attente d'événements du jeu...</div>
    </div>

    <!-- Groq AI advice panel (bottom, always visible) -->
    <div id="groq-advice-panel" class="groq-advice-panel">
        <span class="groq-label">🤖 IA</span>
        <span id="groq-advice-text" class="groq-advice-text">En attente d'analyse...</span>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
